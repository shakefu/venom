name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: lint-pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run prek
        uses: j178/prek-action@v2
