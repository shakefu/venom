name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: lint-commits-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commits:
    name: Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@v3
        with:
          check-latest-tag-only: true
