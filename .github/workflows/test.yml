name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: test-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...
