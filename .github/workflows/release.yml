name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Check CI status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHECK_RUNS_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs")

          echo "gate debug: raw GET .../commits/{sha}/check-runs (full JSON):"
          echo "$CHECK_RUNS_JSON" | jq .

          echo "gate debug: every check run on this page (name / status / conclusion):"
          echo "$CHECK_RUNS_JSON" | jq -r '.check_runs[] | "- \(.name)\tstatus=\(.status)\tconclusion=\(.conclusion // "null")"'

          if [ "$(echo "$CHECK_RUNS_JSON" | jq '.total_count')" != "$(echo "$CHECK_RUNS_JSON" | jq '.check_runs | length')" ]; then
            echo "gate debug: WARNING total_count != check_runs length in this response; list may be paginated — fetch more pages before trusting the gate."
          fi

          echo "gate debug: runs whose names match the gate filter (Pre-commit, Commits, Unit):"
          echo "$CHECK_RUNS_JSON" | jq '.check_runs | map(select(.name == "Pre-commit" or .name == "Commits" or .name == "Unit"))'

          STATUS=$(echo "$CHECK_RUNS_JSON" | jq -c '
            [.check_runs[]
              | select(.name == "Pre-commit" or .name == "Commits" or .name == "Unit")
              | .conclusion // "pending"]
            | group_by(.) | map({(.[0]): length}) | add
          ')

          echo "gate debug: jq conclusion aggregate used for gate: ${STATUS:-<empty>}"
          echo "gate debug: gate passes when that value is exactly {\"success\":3} (three matching runs, all success)."

          if [ "$STATUS" = '{"success":3}' ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: gate
    if: needs.gate.outputs.passed != 'true'
    uses: ./.github/workflows/lint.yml

  commits:
    name: Commits
    needs: gate
    if: needs.gate.outputs.passed != 'true'
    uses: ./.github/workflows/commits.yml

  test:
    name: Test
    needs: gate
    if: needs.gate.outputs.passed != 'true'
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish
    needs: [gate, lint, commits, test]
    if: |
      always() &&
      (needs.gate.outputs.passed == 'true' ||
       (needs.lint.result == 'success' &&
        needs.commits.result == 'success' &&
        needs.test.result == 'success'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        with:
          command: bump
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com
          args: --auto

      - name: Create GitHub release
        if: steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
