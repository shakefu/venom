name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

# CI check runs from the PR do not apply to the post-merge commit SHA (squash/merge creates a new
# commit). Lint/Test/Commits also only run on pull_request or via workflow_call here, not on push
# alone, so GET /commits/{sha}/check-runs during release cannot see Pre-commit/Commits/Unit before
# those jobs run. A "skip if PR already green" gate via that API is not reliable; always run checks.
jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  commits:
    name: Commits
    uses: ./.github/workflows/commits.yml

  test:
    name: Test
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish
    needs: [lint, commits, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        with:
          command: bump
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com
          args: --auto

      - name: Create GitHub release
        if: steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
