name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Check CI status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '[.check_runs[]
              | select(.name == "Pre-commit" or .name == "Commits" or .name == "Unit")
              | .conclusion // "pending"] | group_by(.) | map({(.[0]): length}) | add')
          if [ "$STATUS" = '{"success":3}' ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: gate
    if: needs.gate.outputs.passed != 'true'
    uses: ./.github/workflows/lint.yml

  commits:
    name: Commits
    needs: gate
    if: needs.gate.outputs.passed != 'true'
    uses: ./.github/workflows/commits.yml

  test:
    name: Test
    needs: gate
    if: needs.gate.outputs.passed != 'true'
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish
    needs: [gate, lint, commits, test]
    if: |
      always() &&
      (needs.gate.outputs.passed == 'true' ||
       (needs.lint.result == 'success' &&
        needs.commits.result == 'success' &&
        needs.test.result == 'success'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        with:
          command: bump
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com
          args: --ignore-merge-commits

      - name: Create GitHub release
        if: steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
